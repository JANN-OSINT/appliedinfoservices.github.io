<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIL — ISR Flight Pattern Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0a0c0f;
      --bg-1: #111318;
      --bg-2: #1a1e26;
      --bg-3: #1f2430;
      --green:  #00ff88;
      --amber:  #ffb700;
      --red:    #ff3b3b;
      --blue:   #3b8bff;
      --txt-0:  #e8edf5;
      --txt-1:  #8a9ab5;
      --txt-2:  #4a5568;
      --bdr-0:  #1e2533;
      --bdr-1:  #2e3a4e;
      --mono:   'Share Tech Mono', monospace;
      --ui:     'Barlow', sans-serif;
      --disp:   'Barlow Condensed', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-0);
      background-image:
        linear-gradient(rgba(0,255,136,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--txt-0);
      font-family: var(--ui);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-0); }
    ::-webkit-scrollbar-thumb { background: var(--bdr-1); border-radius: 2px; }

    /* ── Banner & Header ── */
    .cls-banner {
      position: sticky; top: 0; z-index: 1000;
      height: 28px; line-height: 28px;
      background: #1a1200;
      color: var(--amber);
      font-family: var(--disp); font-size: 11px; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase; text-align: center;
      border-bottom: 1px solid rgba(255,183,0,.18);
    }

    .site-header {
      background: var(--bg-1);
      border-bottom: 1px solid var(--bdr-1);
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .brand { border-left: 2px solid var(--green); padding-left: 12px; }
    .brand-name { font-family: var(--disp); font-size: 28px; font-weight: 700; color: var(--green); letter-spacing: .05em; line-height: 1; }
    .brand-sub  { font-family: var(--ui); font-size: 10px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--txt-1); margin-top: 3px; }

    .header-right { text-align: right; }
    .header-build { font-family: var(--mono); font-size: 11px; color: var(--txt-1); letter-spacing: .06em; }
    .status-row   { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 4px; }
    .status-dot   { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: blink 2s ease-in-out infinite; }
    .status-label { font-family: var(--ui); font-size: 10px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--green); }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    /* ── Canvas ── */
    .canvas-wrap { background: var(--bg-0); border-bottom: 1px solid var(--bdr-0); }
    #vigil-canvas { display: block; width: 100%; height: 300px; }
    @media (max-width: 767px) { #vigil-canvas { height: 220px; } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
    .canvas-pulsing { animation: pulse .4s ease-in-out; }

    /* ── Layout ── */
    .page-body { max-width: 1400px; margin: 0 auto; }
    .main-cols { display: flex; flex-direction: column; }
    @media (min-width: 768px) {
      .main-cols { flex-direction: row; align-items: flex-start; padding: 20px; gap: 16px; }
    }

    .panel { background: var(--bg-1); border: 1px solid var(--bdr-0); }
    .panel-params { flex: 0 0 40%; }
    .panel-output { flex: 1; }
    @media (max-width: 767px) { .panel { border-left: none; border-right: none; } }

    .panel-hdr {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: var(--bg-0); border-bottom: 1px solid var(--bdr-0);
    }
    .panel-hdr-icon  { color: var(--green); font-size: 12px; }
    .panel-hdr-title { font-family: var(--disp); font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--txt-1); }
    .panel-body { padding: 14px 16px; }

    .sec-label {
      font-family: var(--ui); font-size: 10px; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: var(--txt-2); margin-bottom: 6px; margin-top: 14px;
    }
    .sec-label:first-child { margin-top: 0; }
    .sec-divider { border: none; border-top: 1px solid var(--bdr-0); margin: 12px 0; }

    /* ── Mode buttons (pattern + profile) ── */
    .btn-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; }

    .mode-btn {
      background: var(--bg-2); border: 1px solid var(--bdr-0);
      color: var(--txt-1); cursor: pointer; text-align: center;
      font-family: var(--disp); font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      transition: background .12s, border-color .12s, color .12s;
    }
    .mode-btn:hover { background: var(--bg-3); border-color: var(--bdr-1); color: var(--txt-0); }
    .mode-btn.active { background: var(--bg-3); border-color: var(--green); color: var(--green); }

    .pattern-btn { font-size: 11px; padding: 8px 4px; }
    .pattern-btn.active { box-shadow: inset 2px 0 0 var(--green); }
    .profile-btn { font-size: 10px; padding: 7px 4px; }

    /* ── Direction toggle ── */
    .dir-toggle {
      display: flex; align-items: center; height: 36px;
      background: var(--bg-2); border: 1px solid var(--bdr-0); overflow: hidden;
    }
    .dir-opt {
      flex: 1; height: 100%; display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 12px; color: var(--txt-2);
      cursor: pointer; user-select: none; letter-spacing: .08em;
      transition: background .12s, color .12s;
    }
    .dir-opt.active { background: var(--bg-3); color: var(--green); }
    .dir-sep { width: 1px; height: 100%; background: var(--bdr-0); flex-shrink: 0; }

    /* ── Form fields ── */
    .field { margin-bottom: 10px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .vigil-label {
      display: block; font-family: var(--ui); font-size: 10px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase; color: var(--txt-1); margin-bottom: 4px;
    }
    .opt-tag { font-size: 9px; color: var(--txt-2); letter-spacing: 0; }
    .input-wrap { position: relative; display: flex; align-items: center; }

    .vigil-input {
      background: var(--bg-2); border: 1px solid var(--bdr-0); border-left: 2px solid var(--bdr-1);
      color: var(--txt-0); font-family: var(--mono); font-size: 13px; padding: 7px 10px;
      width: 100%; outline: none; -webkit-appearance: none; appearance: none;
      transition: border-color .15s;
    }
    .vigil-input:focus        { border-color: var(--green); border-left-color: var(--green); box-shadow: 0 0 0 1px rgba(0,255,136,.15); }
    .vigil-input::placeholder { color: var(--txt-2); }
    .vigil-input.has-unit     { padding-right: 42px; }
    .input-unit { position: absolute; right: 8px; font-family: var(--mono); font-size: 10px; color: var(--txt-2); pointer-events: none; }

    /* ── Generate button ── */
    .gen-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 44px; margin-top: 14px;
      background: rgba(0,255,136,.1); border: 1px solid var(--green);
      color: var(--green); font-family: var(--disp); font-size: 14px; font-weight: 700;
      letter-spacing: .16em; text-transform: uppercase; cursor: pointer;
      transition: background .15s, box-shadow .15s;
    }
    .gen-btn:hover    { background: rgba(0,255,136,.18); box-shadow: 0 0 14px rgba(0,255,136,.15); }
    .gen-btn:active   { transform: scale(.99); }
    .gen-btn:disabled { background: rgba(0,255,136,.04); border-color: var(--txt-2); color: var(--txt-2); cursor: not-allowed; }

    .error-msg {
      color: var(--red); font-family: var(--mono); font-size: 11px;
      margin-bottom: 10px; padding: 8px 10px;
      border: 1px solid var(--red); border-left-width: 2px; background: rgba(255,59,59,.07);
    }

    /* ── Output ── */
    .mission-summary {
      font-family: var(--mono); font-size: 11px; line-height: 1.55; word-break: break-all;
      padding: 8px 10px; margin-bottom: 8px;
      background: var(--bg-0); border: 1px solid var(--bdr-0); border-left: 2px solid var(--blue);
    }
    .acc-badge {
      display: inline-block; font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--bg-0); background: var(--green); padding: 3px 8px; margin-bottom: 12px;
    }

    .metrics-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .metric-chip { font-family: var(--mono); font-size: 11px; color: var(--txt-1); background: var(--bg-2); border: 1px solid var(--bdr-0); padding: 4px 10px; }
    .metric-chip .mv { color: var(--green); }

    .compliance-title {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
      font-family: var(--disp); font-size: 10px; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase; color: var(--txt-1);
    }
    .compliance-title::before { content: ''; display: inline-block; width: 2px; height: 10px; background: var(--green); flex-shrink: 0; }

    .compliance-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; }
    .compliance-table th {
      background: var(--bg-0); color: var(--txt-1);
      font-family: var(--ui); font-size: 10px; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; text-align: left; padding: 5px 8px; border: 1px solid var(--bdr-0);
    }
    .compliance-table td { padding: 5px 8px; border: 1px solid var(--bdr-0); color: var(--txt-0); }
    .compliance-table tbody tr:nth-child(odd)  td { background: var(--bg-2); }
    .compliance-table tbody tr:nth-child(even) td { background: var(--bg-1); }
    .compliance-table tbody tr:hover           td { background: var(--bg-3); }

    .chk-pass, .result-pass { color: var(--green); font-weight: 600; }
    .chk-fail, .result-fail { color: var(--red);   font-weight: 600; }
    .chk-unkn               { color: var(--txt-2); }
    .result-pass, .result-fail { letter-spacing: .06em; }

    /* ── Export ── */
    .export-bar { display: flex; border-bottom: 1px solid var(--bdr-0); }
    .tab-btn {
      flex: 1; padding: 8px 6px; background: transparent;
      border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;
      color: var(--txt-2); font-family: var(--disp); font-size: 10px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
      transition: color .12s, border-color .12s;
    }
    .tab-btn:hover  { color: var(--txt-1); }
    .tab-btn.active { color: var(--txt-0); border-bottom-color: var(--green); }

    .tab-content        { display: none; }
    .tab-content.active { display: block; }

    .vigil-output {
      display: block; width: 100%; min-height: 160px; padding: 12px;
      background: var(--bg-0); border: 1px solid var(--bdr-0); border-left: 2px solid var(--blue);
      font-family: var(--mono); font-size: 11px; color: var(--txt-0); line-height: 1.6;
      resize: vertical; outline: none; -webkit-user-select: text; user-select: text;
    }

    .output-meta { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; }
    .wp-count { font-family: var(--mono); font-size: 10px; color: var(--txt-2); letter-spacing: .08em; text-transform: uppercase; }

    .copy-btn {
      display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      background: transparent; border: 1px solid var(--amber);
      color: var(--amber); font-family: var(--disp); font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
      transition: background .12s;
    }
    .copy-btn:hover  { background: rgba(255,183,0,.08); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    .export-wrap { padding-top: 10px; }
    .compliance-section { margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="cls-banner">UNCLASSIFIED // FOR TRAINING USE ONLY</div>

<header class="site-header">
  <div class="brand">
    <div class="brand-name">VIGIL</div>
    <div class="brand-sub">ISR Flight Pattern Planner</div>
  </div>
  <div class="header-right">
    <div class="header-build">AIS LABS // BUILD 2.0</div>
    <div class="status-row">
      <div class="status-dot"></div>
      <span class="status-label">System Nominal</span>
    </div>
  </div>
</header>

<div class="page-body">
  <div class="canvas-wrap">
    <canvas id="vigil-canvas"></canvas>
  </div>

  <div class="main-cols">

    <section class="panel panel-params">
      <div class="panel-hdr">
        <span class="panel-hdr-icon">◈</span>
        <span class="panel-hdr-title">Mission Parameters</span>
      </div>
      <div class="panel-body">
        <form id="planner-form" novalidate>

          <div class="sec-label">Pattern Type</div>
          <div class="btn-grid-3">
            <button type="button" class="mode-btn pattern-btn active" data-pattern="circular">CIRCULAR</button>
            <button type="button" class="mode-btn pattern-btn" data-pattern="racetrack">RACETRACK</button>
            <button type="button" class="mode-btn pattern-btn" data-pattern="figureeight">FIGURE-8</button>
            <button type="button" class="mode-btn pattern-btn" data-pattern="expsquare">EXP SQ</button>
            <button type="button" class="mode-btn pattern-btn" data-pattern="sector">SECTOR</button>
            <button type="button" class="mode-btn pattern-btn" data-pattern="partrack">PAR TRK</button>
          </div>

          <hr class="sec-divider">

          <div class="sec-label">Mission Profile</div>
          <div class="btn-grid-3" id="preset-row">
            <button type="button" class="mode-btn profile-btn" data-radius="0.8"  data-points="16">INCIDENT</button>
            <button type="button" class="mode-btn profile-btn" data-radius="1.5"  data-points="12">SEARCH</button>
            <button type="button" class="mode-btn profile-btn" data-radius="3.0"  data-points="8">ISR</button>
            <button type="button" class="mode-btn profile-btn" data-radius="12.0" data-points="8">SURVEY</button>
            <button type="button" class="mode-btn profile-btn" data-radius="2.5"  data-points="12">CIRCLING</button>
            <button type="button" class="mode-btn profile-btn" data-points="36">ARC</button>
          </div>

          <hr class="sec-divider">

          <div id="field-dir-toggle">
            <div class="vigil-label">Orbit Direction</div>
            <div class="dir-toggle">
              <div class="dir-opt" id="dir-ccw">◄ CCW</div>
              <div class="dir-sep"></div>
              <div class="dir-opt active" id="dir-cw">CW ►</div>
            </div>
          </div>

          <hr class="sec-divider">

          <div class="grid2">
            <div class="field">
              <label class="vigil-label" for="departure">Departure ICAO</label>
              <div class="input-wrap">
                <input type="text" id="departure" class="vigil-input" placeholder="KJFK" maxlength="4"
                  autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
              </div>
            </div>
            <div class="field">
              <label class="vigil-label" for="arrival">Arrival ICAO</label>
              <div class="input-wrap">
                <input type="text" id="arrival" class="vigil-input" placeholder="KDCA" maxlength="4"
                  autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
              </div>
            </div>
          </div>

          <div class="grid2">
            <div class="field">
              <label class="vigil-label" for="target_lat">Target Lat</label>
              <div class="input-wrap">
                <input type="number" id="target_lat" class="vigil-input" placeholder="40.0000" step="0.0001" min="-90" max="90">
              </div>
            </div>
            <div class="field">
              <label class="vigil-label" for="target_lon">Target Lon</label>
              <div class="input-wrap">
                <input type="number" id="target_lon" class="vigil-input" placeholder="-75.0000" step="0.0001" min="-180" max="180">
              </div>
            </div>
          </div>

          <div class="grid2">
            <div class="field" id="field-radius">
              <label class="vigil-label" id="label-radius" for="radius_nm">Radius</label>
              <div class="input-wrap">
                <input type="number" id="radius_nm" class="vigil-input has-unit" value="5.0" step="0.1" min="0.1">
                <span class="input-unit">NM</span>
              </div>
            </div>
            <div class="field" id="field-num-points">
              <label class="vigil-label" id="label-num-points" for="num_points">Waypoints</label>
              <div class="input-wrap">
                <input type="number" id="num_points" class="vigil-input" value="8" step="1" min="3" max="64">
              </div>
            </div>
          </div>

          <div class="field" id="field-leg-length" hidden>
            <label class="vigil-label" for="leg_length_nm">Leg Length</label>
            <div class="input-wrap">
              <input type="number" id="leg_length_nm" class="vigil-input has-unit" value="5.0" step="0.5" min="0.5">
              <span class="input-unit">NM</span>
            </div>
          </div>

          <div class="field" id="field-inbound-course" hidden>
            <label class="vigil-label" id="label-inbound-course" for="inbound_course">Inbound Course</label>
            <div class="input-wrap">
              <input type="number" id="inbound_course" class="vigil-input has-unit" value="270" step="1" min="0" max="359">
              <span class="input-unit">°</span>
            </div>
          </div>

          <div class="field" id="field-sar-spacing" hidden>
            <label class="vigil-label" id="label-sar-spacing" for="sar_spacing">Leg Spacing</label>
            <div class="input-wrap">
              <input type="number" id="sar_spacing" class="vigil-input has-unit" value="1.0" step="0.1" min="0.1">
              <span class="input-unit">NM</span>
            </div>
          </div>

          <div class="grid2">
            <div class="field">
              <label class="vigil-label" for="airspeed_kts">Airspeed <span class="opt-tag">OPT</span></label>
              <div class="input-wrap">
                <input type="number" id="airspeed_kts" class="vigil-input has-unit" placeholder="90" step="1" min="1">
                <span class="input-unit">KTS</span>
              </div>
            </div>
            <div class="field">
              <label class="vigil-label" for="altitude_ft">Altitude <span class="opt-tag">OPT</span></label>
              <div class="input-wrap">
                <input type="number" id="altitude_ft" class="vigil-input has-unit" placeholder="3000" step="100" min="0">
                <span class="input-unit">FT</span>
              </div>
            </div>
          </div>

          <div id="form-error" class="error-msg" hidden></div>
          <button type="submit" id="generate-btn" class="gen-btn">
            <span>◈</span><span id="gen-label">GENERATE ORBIT</span>
          </button>

        </form>
      </div>
    </section>

    <section class="panel panel-output" id="output-panel" hidden>
      <div class="panel-hdr">
        <span class="panel-hdr-icon">◈</span>
        <span class="panel-hdr-title">Mission Output</span>
      </div>
      <div class="panel-body">

        <div id="mission-summary" class="mission-summary"></div>
        <div id="accuracy-badge" class="acc-badge"></div>
        <div id="metrics-strip" class="metrics-strip" hidden></div>

        <div id="compliance-section" class="compliance-section" hidden>
          <div class="compliance-title">Profile Compliance</div>
          <table class="compliance-table">
            <thead>
              <tr><th>Profile</th><th>Drift</th><th>Turn Rate</th><th>Altitude</th><th>Result</th></tr>
            </thead>
            <tbody id="compliance-body"></tbody>
          </table>
        </div>

        <hr class="sec-divider">

        <div class="export-bar" role="tablist">
          <button class="tab-btn active" role="tab" data-tab="skyvector">SKYVECTOR</button>
          <button class="tab-btn" role="tab" data-tab="simbrief">SIMBRIEF</button>
          <button class="tab-btn" role="tab" data-tab="plaintext">PLAIN TEXT</button>
          <button class="tab-btn" role="tab" data-tab="arcbrief">ARC BRIEF</button>
        </div>

        <div class="export-wrap">
          <div id="tab-skyvector" class="tab-content active"><textarea id="out-skyvector" class="vigil-output" readonly spellcheck="false"></textarea></div>
          <div id="tab-simbrief"  class="tab-content"><textarea id="out-simbrief"  class="vigil-output" readonly spellcheck="false"></textarea></div>
          <div id="tab-plaintext" class="tab-content"><textarea id="out-plaintext" class="vigil-output" readonly spellcheck="false"></textarea></div>
          <div id="tab-arcbrief"  class="tab-content"><textarea id="out-arcbrief"  class="vigil-output" readonly spellcheck="false"></textarea></div>

          <div class="output-meta">
            <span id="waypoint-count" class="wp-count"></span>
            <button id="copy-btn" class="copy-btn" type="button">
              <span>⧉</span><span id="copy-label">COPY TO CLIPBOARD</span>
            </button>
          </div>
        </div>

      </div>
    </section>

  </div>
</div>

<script>
'use strict';

// ── Geometry ──────────────────────────────────────────────────────────────────

const DEG_LAT = 1 / 60;

const destPt = (lat, lon, brg, dist) => {
  const r = brg * Math.PI / 180;
  const s = Math.cos(lat * Math.PI / 180);
  return [lat + dist * Math.cos(r) * DEG_LAT, lon + dist * Math.sin(r) / (60 * s)];
};

const orbit = (lat, lon, r, n) =>
  Array.from({ length: n }, (_, i) => {
    const a = (2 * Math.PI * i) / n;
    const s = Math.cos(lat * Math.PI / 180);
    return [+(lat + r * Math.cos(a) * DEG_LAT).toFixed(6), +(lon + r * Math.sin(a) / (60 * s)).toFixed(6)];
  });

const racetrack = (lat, lon, r, leg, course, semi, dir) => {
  const opp  = (course + 180) % 360;
  const half = leg / 2;
  const far  = destPt(lat, lon, course, half);
  const near = destPt(lat, lon, opp, half);
  const perp = dir === 'CW' ? (course + 90) % 360 : (course - 90 + 360) % 360;
  const fc   = destPt(far[0],  far[1],  perp, r);
  const nc   = destPt(near[0], near[1], perp, r);
  const arc  = (cx, cy, start, sign) =>
    Array.from({ length: semi + 1 }, (_, i) => {
      const pt = destPt(cx, cy, (start + sign * i * (180 / semi) + 360) % 360, r);
      return [+pt[0].toFixed(6), +pt[1].toFixed(6)];
    });
  const sign      = dir === 'CW' ? 1 : -1;
  // Arc entry bearing depends on turn direction: for CW far arc enters from opp,
  // for CCW the perpendicular offset is left so far arc enters from course.
  const farStart  = dir === 'CW' ? opp    : course;
  const nearStart = dir === 'CW' ? course : opp;
  return [...arc(fc[0], fc[1], farStart, sign), ...arc(nc[0], nc[1], nearStart, sign)];
};

const figureEight = (lat, lon, r, axis, n) => {
  const [c1, c2] = [destPt(lat, lon, axis, r), destPt(lat, lon, (axis + 180) % 360, r)];
  const lobe = (cx, cy, start, sign) =>
    Array.from({ length: n }, (_, i) => {
      const b = (start + sign * i * (360 / n) + 360) % 360, br = b * Math.PI / 180;
      const s = Math.cos(cx * Math.PI / 180);
      return [+(cx + r * Math.cos(br) / 60).toFixed(6), +(cy + r * Math.sin(br) / (60 * s)).toFixed(6)];
    });
  return [...lobe(c1[0], c1[1], (axis + 180) % 360, 1), ...lobe(c2[0], c2[1], axis % 360, -1)];
};

const expandingSquare = (lat, lon, spacing, hdg, legs) => {
  const wps  = [[+lat.toFixed(6), +lon.toFixed(6)]];
  let [cx, cy, dist, dir] = [lat, lon, spacing, 0];
  const dirs = [0, 90, 180, 270];
  for (let i = 0; i < legs; i++) {
    const pt = destPt(cx, cy, (hdg + dirs[dir % 4]) % 360, dist);
    wps.push([+pt[0].toFixed(6), +pt[1].toFixed(6)]);
    [cx, cy] = pt;
    if (++dir % 2 === 0) dist += spacing;
  }
  return wps;
};

const sectorSearch = (lat, lon, r, n, initBrg) =>
  Array.from({ length: n }, (_, i) => {
    const tip = destPt(lat, lon, (initBrg + i * (360 / n)) % 360, r);
    return [[+tip[0].toFixed(6), +tip[1].toFixed(6)], [+lat.toFixed(6), +lon.toFixed(6)]];
  }).flat();

const parallelTrack = (lat, lon, hdg, leg, spacing, legs) => {
  const wps = [];
  let [cx, cy] = [lat, lon];
  const perp  = (hdg + 90) % 360;
  const back  = (hdg + 180) % 360;
  for (let i = 0; i < legs; i++) {
    const end = destPt(cx, cy, i % 2 === 0 ? hdg : back, leg);
    wps.push([+cx.toFixed(6), +cy.toFixed(6)], [+end[0].toFixed(6), +end[1].toFixed(6)]);
    if (i < legs - 1) { const ns = destPt(end[0], end[1], perp, spacing); [cx, cy] = ns; }
  }
  return wps;
};

// ── Compliance ────────────────────────────────────────────────────────────────

const PROFILES = {
  INCIDENT: { driftCapNm: 0.8,  minTurnDps: 3.5, altMin: 200,  altMax: 5000 },
  SEARCH:   { driftCapNm: 1.5,  minTurnDps: null, altMin: null, altMax: null },
  ISR:      { driftCapNm: 3.0,  minTurnDps: 0.6,  altMin: 1500, altMax: null },
  SURVEY:   { driftCapNm: 12.0, minTurnDps: null, altMin: null, altMax: null },
  CIRCLING: { driftCapNm: 1.35, minTurnDps: null, altMin: null, altMax: null },
};

const orbitalMetrics = (r, spd) => {
  if (!spd || spd <= 0) return null;
  const period = (2 * Math.PI * r * 6076.115) / (spd * 1.68781);
  return { periodMin: (period / 60).toFixed(1), turnRateDps: (360 / period).toFixed(2) };
};

const checkCompliance = (r, spd, alt) => {
  const m    = orbitalMetrics(r, spd);
  const rate = m ? parseFloat(m.turnRateDps) : null;
  return Object.fromEntries(Object.entries(PROFILES).map(([name, p]) => {
    const drift = r <= p.driftCapNm;
    const turn  = p.minTurnDps === null ? null : rate !== null ? rate >= p.minTurnDps : null;
    const altOk = (p.altMin === null && p.altMax === null) ? null
                : alt == null ? null
                : (p.altMin !== null && alt < p.altMin) || (p.altMax !== null && alt > p.altMax) ? false : true;
    return [name, { drift, turnRate: turn, altitude: altOk, pass: drift && turn !== false && altOk !== false }];
  }));
};

// ── Formatters ────────────────────────────────────────────────────────────────

const fmt4 = n => n.toFixed(4);
const fmt6 = n => (n >= 0 ? '+' : '') + n.toFixed(6);
const pad  = (n, w) => String(Math.round(n)).padStart(w, '0');

const toDMS = (deg, isLon) => {
  const sign = deg >= 0;
  const abs  = Math.abs(deg);
  const d    = Math.floor(abs);
  const mF   = (abs - d) * 60;
  const m0   = Math.floor(mF);
  let s = Math.round((mF - m0) * 60);
  let m = m0;
  if (s >= 60) { s -= 60; m++; }
  const dFinal = m >= 60 ? d + 1 : d;
  const mFinal = m >= 60 ? m - 60 : m;
  const dir  = isLon ? (sign ? 'E' : 'W') : (sign ? 'N' : 'S');
  return String(dFinal).padStart(isLon ? 3 : 2, '0') + String(mFinal).padStart(2, '0') + String(s).padStart(2, '0') + dir;
};

const formatSkyVector  = wps => wps.map(w => `${fmt4(w[0])},${fmt4(w[1])}`).join('\n');
const formatSimBrief   = wps => wps.map(w => toDMS(w[0], false) + toDMS(w[1], true)).join(' ');
const formatPlainText  = wps => wps.map((w, i) => `WP${String(i+1).padStart(2,'0')}: ${fmt6(w[0])} ${fmt6(w[1])}`).join('\n');

const formatArcBrief = (wps, r, n, dir) => {
  const dps  = 360 / n;
  const sign = dir === 'CCW' ? -1 : 1;
  const rows = wps.map((w, i) => {
    const brg = ((sign * i * dps) % 360 + 360) % 360;
    const hdg = dir === 'CW' ? (brg + 90) % 360 : (brg - 90 + 360) % 360;
    return `${String(i+1).padStart(2,'0')}   ${pad(brg,3)}°     ${pad(hdg,3)}°   ${fmt6(w[0])}   ${fmt6(w[1])}`;
  });
  return [
    `ARC BRIEF — ${r} NM | ${dir === 'CCW' ? 'COUNTERCLOCKWISE' : 'CLOCKWISE'} | ${n} SEGMENTS`,
    `TURN ${Math.round(dps)} / TWIST ${Math.round(dps)}`, '',
    'SEG  BEARING  HEADING  LAT           LON',
    ...rows
  ].join('\n');
};

const formatPatternBrief = (wps, type, opts) => {
  const { r, leg, course, semi, dir, axis, spacing } = opts;
  if (type === 'racetrack') {
    const opp = (course + 180) % 360;
    return [
      `RACETRACK BRIEF — ${r} NM TURNS | ${leg} NM LEGS | ${dir === 'CCW' ? 'COUNTERCLOCKWISE' : 'CLOCKWISE'}`,
      `OUTBOUND COURSE: ${pad(course,3)}°  INBOUND: ${pad(opp,3)}°`, '', 'WP   TYPE    LAT           LON',
      ...wps.map((w, i) => `${String(i+1).padStart(2,'0')}   ${i < semi+1 ? 'TURN-1' : 'TURN-2'}  ${fmt6(w[0])}   ${fmt6(w[1])}`)
    ].join('\n');
  }
  if (type === 'figureeight') {
    const half = Math.floor(wps.length / 2);
    return [
      `FIGURE-8 BRIEF — ${r} NM LOBES | AXIS: ${pad(axis,3)}°/${pad((axis+180)%360,3)}°`,
      'LOBE 1 (CW) — LOBE 2 (CCW)', '', 'WP   LOBE  LAT           LON',
      ...wps.map((w, i) => `${String(i+1).padStart(2,'0')}   ${i < half ? '1-CW' : '2-CCW'}  ${fmt6(w[0])}   ${fmt6(w[1])}`)
    ].join('\n');
  }
  if (type === 'expsquare') {
    let [dist, cnt] = [spacing, 0];
    return [
      'SAR BRIEF — EXPANDING SQUARE',
      `DATUM: ${wps[0][0].toFixed(6)}, ${wps[0][1].toFixed(6)}`,
      `INITIAL HEADING: ${pad(course,3)}°  |  LEG SPACING: ${spacing} NM`, '', 'WP   LEG LENGTH  LAT           LON',
      ...wps.map((w, i) => {
        const tag = i === 0 ? 'DATUM   ' : `${dist.toFixed(1)} NM  `;
        if (i > 0 && ++cnt % 2 === 0) dist += spacing;
        return `${String(i+1).padStart(2,'0')}   ${tag}  ${fmt6(w[0])}   ${fmt6(w[1])}`;
      })
    ].join('\n');
  }
  if (type === 'sector') {
    const secAngle = 360 / semi;
    return [
      'SAR BRIEF — SECTOR SEARCH',
      `CENTER: ${wps[1][0].toFixed(6)}, ${wps[1][1].toFixed(6)}`,
      `SEARCH RADIUS: ${r} NM  |  ${semi} SECTORS @ ${secAngle.toFixed(0)}°`, '', 'WP   TYPE    BRG   LAT           LON',
      ...wps.map((w, i) => {
        const isTip = i % 2 === 0;
        const brg   = isTip ? `${pad((course + Math.floor(i/2) * secAngle) % 360, 3)}°` : '   ';
        return `${String(i+1).padStart(2,'00')}   ${isTip ? 'TIP ' : 'DATM'}    ${brg}   ${fmt6(w[0])}   ${fmt6(w[1])}`;
      })
    ].join('\n');
  }
  if (type === 'partrack') {
    return [
      'SAR BRIEF — PARALLEL TRACK (CREEPING LINE)',
      `TRACK HEADING: ${pad(course,3)}°  |  LEG LENGTH: ${leg} NM  |  SPACING: ${spacing} NM`, '', 'WP   TYPE     LAT           LON',
      ...wps.map((w, i) => `${String(i+1).padStart(2,'0')}   ${i%2===0 ? 'LEG-START' : 'LEG-END  '}  ${fmt6(w[0])}   ${fmt6(w[1])}`)
    ].join('\n');
  }
};

// ── State ─────────────────────────────────────────────────────────────────────

let patternType = 'circular';
let orbitDir    = 'CW';

// ── Canvas ────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('vigil-canvas');
const ctx    = canvas.getContext('2d');

const params = () => ({
  r:       parseFloat(document.getElementById('radius_nm').value)     || 5,
  n:       parseInt(document.getElementById('num_points').value, 10)  || 8,
  leg:     parseFloat(document.getElementById('leg_length_nm').value)  || 5,
  course:  parseFloat(document.getElementById('inbound_course').value) || 270,
  spacing: parseFloat(document.getElementById('sar_spacing').value)    || 1,
});

const drawGrid = (w, h) => {
  ctx.strokeStyle = 'rgba(0,255,136,0.04)'; ctx.lineWidth = 1;
  for (let x = 0; x <= w; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for (let y = 0; y <= h; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
};

const drawCrosshair = (cx, cy) => {
  ctx.strokeStyle = '#ffb700'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx-9,cy); ctx.lineTo(cx+9,cy); ctx.moveTo(cx,cy-9); ctx.lineTo(cx,cy+9); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fillStyle = '#ffb700'; ctx.fill();
};

const drawWP = (x, y, i) => {
  ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI*2); ctx.fillStyle = '#00ff88'; ctx.fill();
  if (i < 12) {
    ctx.fillStyle = 'rgba(0,255,136,0.65)'; ctx.font = '9px Share Tech Mono,monospace';
    ctx.textAlign = 'left'; ctx.fillText(`WP${String(i+1).padStart(2,'0')}`, x+5, y-3);
  }
};

const drawLabel = text => {
  ctx.fillStyle = '#00ff88'; ctx.font = '11px Share Tech Mono,monospace';
  ctx.textAlign = 'left'; ctx.fillText(text, 12, canvas.height - 12);
};

const renderCanvas = () => {
  const w = canvas.width, h = canvas.height;
  if (!w || !h) return;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0a0c0f'; ctx.fillRect(0, 0, w, h);
  drawGrid(w, h);

  const cx = w/2, cy = h/2, avail = Math.min(w,h)/2 - 44;
  const p = params();

  ctx.fillStyle = '#8a9ab5'; ctx.font = '11px Barlow,sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('N↑', w-10, 22);
  drawCrosshair(cx, cy);

  ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 1.5; ctx.setLineDash([]);

  if (patternType === 'circular') {
    ctx.beginPath(); ctx.arc(cx, cy, avail, 0, Math.PI*2); ctx.stroke();
    const n = Math.max(3, Math.min(p.n, 64));
    for (let i = 0; i < n; i++) {
      const a = (2*Math.PI*i)/n;
      drawWP(cx + avail*Math.sin(a), cy - avail*Math.cos(a), i);
    }
    drawLabel(`CIRCULAR  r=${p.r}NM  n=${n}`);

  } else if (patternType === 'figureeight') {
    const r8  = avail * .46;
    const axR = (p.course - 90) * Math.PI / 180;
    const c1  = [cx + r8*Math.cos(axR), cy + r8*Math.sin(axR)];
    const c2  = [cx - r8*Math.cos(axR), cy - r8*Math.sin(axR)];
    [c1, c2].forEach(([lx, ly]) => { ctx.beginPath(); ctx.arc(lx, ly, r8, 0, Math.PI*2); ctx.stroke(); });
    const n8 = Math.max(4, Math.min(p.n, 32));
    for (let i = 0; i < n8; i++) {
      const a = (2*Math.PI*i)/n8;
      drawWP(c1[0] + r8*Math.cos(a), c1[1] + r8*Math.sin(a), i);
    }
    drawLabel(`FIGURE-8  r=${p.r}NM  axis=${p.course}°`);

  } else if (patternType === 'racetrack') {
    const inbR  = (p.course - 90) * Math.PI / 180;
    const legPx = avail * .55, trnR = avail * .35;
    const [dx, dy] = [Math.cos(inbR), Math.sin(inbR)];
    const side = orbitDir === 'CW' ? 1 : -1;
    const [px, py] = [-dy*side, dx*side];
    const pts = [
      [cx+dx*legPx, cy+dy*legPx], [cx+dx*legPx+px*trnR*2, cy+dy*legPx+py*trnR*2],
      [cx-dx*legPx, cy-dy*legPx], [cx-dx*legPx+px*trnR*2, cy-dy*legPx+py*trnR*2],
    ];
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]); ctx.lineTo(pts[1][0],pts[1][1]);
    ctx.moveTo(pts[2][0],pts[2][1]); ctx.lineTo(pts[3][0],pts[3][1]); ctx.stroke();
    [[pts[0],pts[1]], [pts[2],pts[3]]].forEach(([a,b]) => {
      const [mcx, mcy] = [(a[0]+b[0])/2, (a[1]+b[1])/2];
      const fa = Math.atan2(a[1]-mcy, a[0]-mcx);
      ctx.beginPath(); ctx.arc(mcx, mcy, trnR, fa, fa+Math.PI*(orbitDir==='CW'?1:-1), orbitDir==='CCW'); ctx.stroke();
    });
    [pts[0],pts[1],pts[3],pts[2]].forEach((pt, i) => drawWP(pt[0], pt[1], i));
    drawLabel(`RACETRACK  r=${p.r}NM  leg=${p.leg}NM`);

  } else if (patternType === 'expsquare') {
    const step = avail / Math.max(4, p.n*.6+2);
    let [ex, ey, dist, dir] = [cx, cy, step, 0];
    const hdR  = (p.course - 90) * Math.PI / 180;
    const dirs = [0, Math.PI/2, Math.PI, -Math.PI/2];
    ctx.beginPath(); ctx.moveTo(ex, ey);
    for (let i = 0; i < Math.min(p.n, 20); i++) {
      const d = hdR + dirs[dir % 4];
      const nx = ex + Math.cos(d)*dist, ny = ey + Math.sin(d)*dist;
      ctx.lineTo(nx, ny); drawWP(nx, ny, i);
      [ex, ey] = [nx, ny];
      if (++dir % 2 === 0) dist += step;
    }
    ctx.stroke();
    drawLabel(`EXP SQUARE  legs=${p.n}  spc=${p.spacing}NM`);

  } else if (patternType === 'sector') {
    const ns = Math.max(2, Math.min(p.n, 12));
    const sr = avail * .78;
    for (let i = 0; i < ns; i++) {
      const a  = ((p.course + i*(360/ns)) - 90) * Math.PI / 180;
      const tx = cx + sr*Math.cos(a), ty = cy + sr*Math.sin(a);
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(tx,ty); ctx.stroke();
      drawWP(tx, ty, i);
    }
    drawLabel(`SECTOR  r=${p.r}NM  n=${ns}`);

  } else if (patternType === 'partrack') {
    const nl   = Math.max(1, Math.min(p.n, 10));
    const hdR2 = (p.course - 90) * Math.PI / 180;
    const legPx2 = avail * .72;
    const spcPx  = Math.min(avail*.18, (avail*.9)/Math.max(nl,1));
    const perpR  = hdR2 + Math.PI/2;
    let [ptx, pty] = [cx + Math.cos(perpR)*(-(nl-1)*spcPx/2), cy + Math.sin(perpR)*(-(nl-1)*spcPx/2)];
    for (let i = 0; i < nl; i++) {
      const d   = i%2===0 ? hdR2 : hdR2+Math.PI;
      const ex2 = ptx+Math.cos(d)*legPx2, ey2 = pty+Math.sin(d)*legPx2;
      ctx.beginPath(); ctx.moveTo(ptx,pty); ctx.lineTo(ex2,ey2); ctx.stroke();
      drawWP(ptx,pty,i*2); drawWP(ex2,ey2,i*2+1);
      ptx += Math.cos(perpR)*spcPx; pty += Math.sin(perpR)*spcPx;
    }
    drawLabel(`PAR TRACK  legs=${nl}  spc=${p.spacing}NM`);
  }
};

const initCanvas = () => {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  renderCanvas();
};
window.addEventListener('resize', initCanvas);
setTimeout(initCanvas, 0);

const showError  = msg => { const el = document.getElementById('form-error'); el.textContent = msg; el.hidden = false; };
const clearError = ()  => { const el = document.getElementById('form-error'); el.textContent = '';  el.hidden = true; };

document.getElementById('planner-form').addEventListener('submit', e => {
  e.preventDefault();
  clearError();

  const get    = id => document.getElementById(id);
  const dep    = get('departure').value.trim().toUpperCase();
  const arr    = get('arrival').value.trim().toUpperCase();
  const lat    = parseFloat(get('target_lat').value);
  const lon    = parseFloat(get('target_lon').value);
  const r      = parseFloat(get('radius_nm').value);
  const n      = parseInt(get('num_points').value, 10);
  const spd    = get('airspeed_kts').value.trim() !== '' ? parseFloat(get('airspeed_kts').value) : null;
  const alt    = get('altitude_ft').value.trim()  !== '' ? parseFloat(get('altitude_ft').value)  : null;
  const leg    = parseFloat(get('leg_length_nm').value);
  const course = parseFloat(get('inbound_course').value);
  const spc    = parseFloat(get('sar_spacing').value);
  const p      = patternType;

  if (!dep || !arr)                          return showError('Departure and arrival ICAO codes are required.');
  if (isNaN(lat) || isNaN(lon))              return showError('Target latitude and longitude are required.');
  if (lat < -90 || lat > 90)                 return showError('Latitude must be between -90 and 90.');
  if (lon < -180 || lon > 180)               return showError('Longitude must be between -180 and 180.');
  if (['circular','figureeight','sector'].includes(p) && (isNaN(r) || r <= 0)) return showError('Radius must be a positive number.');
  if (p === 'circular' && (isNaN(n) || n < 3 || n > 64))     return showError('Waypoints must be between 3 and 64.');
  if (p === 'racetrack') {
    if (isNaN(leg) || leg <= 0)              return showError('Leg length must be a positive number.');
    if (isNaN(course))                       return showError('Inbound course is required for racetrack.');
    if (isNaN(n) || n < 2 || n > 32)        return showError('Points per turn must be between 2 and 32.');
  }
  if (p === 'figureeight') {
    if (isNaN(course))                       return showError('Axis course is required for figure-8.');
    if (isNaN(n) || n < 4 || n > 64)        return showError('Waypoints per lobe must be between 4 and 64.');
  }
  if (p === 'expsquare') {
    if (isNaN(spc) || spc <= 0)             return showError('Leg spacing must be a positive number.');
    if (isNaN(course))                       return showError('Initial heading is required.');
    if (isNaN(n) || n < 1)                   return showError('Num legs must be at least 1.');
  }
  if (p === 'sector') {
    if (isNaN(course))                       return showError('Initial bearing is required.');
    if (isNaN(n) || n < 2)                   return showError('Num sectors must be at least 2.');
  }
  if (p === 'partrack') {
    if (isNaN(leg) || leg <= 0)             return showError('Leg length must be a positive number.');
    if (isNaN(spc) || spc <= 0)             return showError('Track spacing must be a positive number.');
    if (isNaN(course))                       return showError('Track heading is required.');
    if (isNaN(n) || n < 1)                   return showError('Num legs must be at least 1.');
  }

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  document.getElementById('gen-label').textContent = 'GENERATING…';
  canvas.classList.add('canvas-pulsing');
  setTimeout(() => canvas.classList.remove('canvas-pulsing'), 450);

  setTimeout(() => {
    let wps, summary, badge, brief;
    const route  = `${dep} → ${arr}`;
    const target = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;

    if (p === 'racetrack') {
      const out = (course + 180) % 360;
      wps     = racetrack(lat, lon, r, leg, out, n, orbitDir);
      summary = `${route} | TARGET: ${target} | RACETRACK ${r}NM × ${leg}NM | ${orbitDir}`;
      badge   = `RACETRACK | ${wps.length} pts`;
      brief   = formatPatternBrief(wps, 'racetrack', { r, leg, course: out, semi: n, dir: orbitDir });
      document.querySelector('.tab-btn[data-tab="arcbrief"]').textContent = 'RACETRACK';

    } else if (p === 'figureeight') {
      wps     = figureEight(lat, lon, r, course, n);
      summary = `${route} | TARGET: ${target} | FIGURE-8 ${r}NM | AXIS ${pad(course,3)}°`;
      badge   = `FIGURE-8 | ${wps.length} pts`;
      brief   = formatPatternBrief(wps, 'figureeight', { r, axis: course });
      document.querySelector('.tab-btn[data-tab="arcbrief"]').textContent = 'FIG-8';

    } else if (p === 'expsquare') {
      wps     = expandingSquare(lat, lon, spc, course, n);
      summary = `${route} | DATUM: ${target} | EXP SQUARE | ${n} legs | ${spc} NM spacing`;
      badge   = `EXP SQUARE | ${wps.length} wpts`;
      brief   = formatPatternBrief(wps, 'expsquare', { course, spacing: spc });
      document.querySelector('.tab-btn[data-tab="arcbrief"]').textContent = 'SAR BRIEF';

    } else if (p === 'sector') {
      wps     = sectorSearch(lat, lon, r, n, course);
      summary = `${route} | DATUM: ${target} | SECTOR | ${n} sectors | ${r} NM radius`;
      badge   = `SECTOR | ${wps.length} wpts`;
      brief   = formatPatternBrief(wps, 'sector', { r, semi: n, course });
      document.querySelector('.tab-btn[data-tab="arcbrief"]').textContent = 'SAR BRIEF';

    } else if (p === 'partrack') {
      wps     = parallelTrack(lat, lon, course, leg, spc, n);
      summary = `${route} | START: ${target} | PAR TRACK | ${n} legs | ${leg}NM × ${spc}NM`;
      badge   = `PAR TRACK | ${wps.length} wpts`;
      brief   = formatPatternBrief(wps, 'partrack', { leg, course, spacing: spc });
      document.querySelector('.tab-btn[data-tab="arcbrief"]').textContent = 'SAR BRIEF';

    } else {
      let w = orbit(lat, lon, r, n);
      if (orbitDir === 'CCW') w = [...w].reverse();
      const sagitta = r * (1 - Math.cos(Math.PI / n));
      const maxErr  = Math.round(sagitta * 6076.115 * 10) / 10;
      wps     = w;
      summary = `${route} | TARGET: ${target} | RADIUS: ${r} NM | ${orbitDir}`;
      badge   = `Max Error: ${maxErr} ft`;
      brief   = formatArcBrief(wps, r, n, orbitDir);
      document.querySelector('.tab-btn[data-tab="arcbrief"]').textContent = 'ARC BRIEF';
    }

    document.getElementById('mission-summary').textContent = summary;
    document.getElementById('accuracy-badge').textContent  = badge;
    document.getElementById('waypoint-count').textContent  = `${wps.length} waypoints`;
    document.getElementById('out-skyvector').value = formatSkyVector(wps);
    document.getElementById('out-simbrief').value  = formatSimBrief(wps);
    document.getElementById('out-plaintext').value = formatPlainText(wps);
    document.getElementById('out-arcbrief').value  = brief;

    const isSAR = ['expsquare','sector','partrack'].includes(p);
    if (!isSAR) {
      const m = orbitalMetrics(r, spd);
      const metricsEl = document.getElementById('metrics-strip');
      if (m) {
        metricsEl.innerHTML = `<div class="metric-chip">Period: <span class="mv">${m.periodMin} min</span></div><div class="metric-chip">Turn Rate: <span class="mv">${m.turnRateDps} °/s</span></div>`;
        metricsEl.hidden = false;
      } else {
        metricsEl.hidden = true;
      }
      const comp  = checkCompliance(r, spd, alt);
      const tbody = document.getElementById('compliance-body');
      const chk   = (v, pass, fail) => v === null ? '<span class="chk-unkn">—</span>'
                                     : v ? `<span class="chk-pass">${pass}</span>` : `<span class="chk-fail">${fail}</span>`;
      tbody.innerHTML = Object.entries(comp).map(([name, c]) => {
        const pp = PROFILES[name];
        return `<tr>
          <td>${name}</td>
          <td>${chk(c.drift,    `✓ ≤${pp.driftCapNm}`, `✗ >${pp.driftCapNm}`)}</td>
          <td>${chk(c.turnRate, `✓ ≥${pp.minTurnDps}°/s`, `✗ <${pp.minTurnDps}°/s`)}</td>
          <td>${chk(c.altitude, '✓', '✗')}</td>
          <td class="${c.pass ? 'result-pass' : 'result-fail'}">${c.pass ? 'PASS' : 'FAIL'}</td>
        </tr>`;
      }).join('');
      document.getElementById('compliance-section').hidden = false;
    } else {
      document.getElementById('compliance-section').hidden = true;
      document.getElementById('metrics-strip').hidden = true;
    }

    document.getElementById('output-panel').hidden = false;
    switchTab('skyvector');
    btn.disabled = false;
    document.getElementById('gen-label').textContent = 'GENERATE ORBIT';
  }, 0);
});

// ── Copy ──────────────────────────────────────────────────────────────────────

document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById(outputs[activeTab]).value;
  if (!text) return;
  const onCopied = () => {
    const lbl = document.getElementById('copy-label');
    const btn = document.getElementById('copy-btn');
    lbl.textContent = '✓ COPIED'; btn.classList.add('copied');
    setTimeout(() => { lbl.textContent = 'COPY TO CLIPBOARD'; btn.classList.remove('copied'); }, 1500);
  };
  navigator.clipboard?.writeText(text).then(onCopied).catch(() => {
    const ta = document.getElementById(outputs[activeTab]);
    ta.select(); ta.setSelectionRange(0, text.length);
    try { document.execCommand('copy'); onCopied(); } catch {}
  });
});
</script>
</body>
</html>
